# log.nym.asia - Log system
# Proxies all requests to log-frontend (which handles SPA routing and API proxy internally)

server {
    listen 80;
    server_name log.nym.asia;

    location / {
        proxy_pass http://log-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
