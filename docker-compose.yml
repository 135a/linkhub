# =============================================
# LinkHub - Docker Compose 基础配置
#
# 使用方式：
#   Dev:  docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Prod: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 短链 / 日志控制台公网（与 frontend build args、Java 环境变量对齐）：
#   - linkhub-project: SHORT_LINK_DOMAIN_DEFAULT = 存入库的 host[:port]/短码 中的 host 段（无 scheme），开发示例 127.0.0.1:8001，生产示例 link.nym.asia（勿带尾斜杠）
#   - linkhub-project: SHORT_LINK_PUBLIC_SCHEME = http（开发）或 https（生产），与库中 full_short_url 拼成对外完整 URL
#   - linkhub-frontend build: VITE_PUBLIC_SHORTLINK_BASE_URL 可选，非空时控制台短链展示强制用该 origin + '/' + 短码（无尾斜杠）；空则用 VITE_SHORT_LINK_PUBLIC_SCHEME + '://' + fullShortUrl
#   - linkhub-frontend build: VITE_PUBLIC_LOG_CONSOLE_URL = 日志前端入口，开发 http://localhost:3001，生产 https://log.nym.asia
# =============================================

services:
  mysql:
    build:
      context: ./short-link-java
      dockerfile: mysql/Dockerfile
    container_name: linkhub-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: link
      SPRING_APPLICATION_NAME: mysql
    volumes:
      - mysql-data:/var/lib/mysql
      - ./short-link-log-go/init-mysql/01_create_log_users.sql:/docker-entrypoint-initdb.d/4-create_log_users.sql
    networks:
      - linkhub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"

  redis:
    image: redis:latest
    container_name: linkhub-redis
    ports:
      - "6379:6379"
    environment:
      SPRING_APPLICATION_NAME: redis
    networks:
      - linkhub-network
    command: redis-server --maxmemory 384m --maxmemory-policy allkeys-lru
    restart: unless-stopped
    logging:
      driver: "json-file"

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: linkhub-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=768m
      - JVM_XMX=768m
      - JVM_XMN=512m
      - SPRING_APPLICATION_NAME=nacos
    networks:
      - linkhub-network
    restart: unless-stopped

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.4
    container_name: linkhub-rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT=-Xms64m -Xmx128m -Xmn64m -XX:MetaspaceSize=32m -XX:MaxMetaspaceSize=64m
      - SPRING_APPLICATION_NAME=rocketmq-namesrv
    command: sh mqnamesrv
    networks:
      - linkhub-network
    restart: unless-stopped
    logging:
      driver: "json-file"

  rocketmq-broker:
    image: apache/rocketmq:4.9.4
    container_name: linkhub-rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      # - JAVA_OPT=-Duser.home=/opt -Xms512m -Xmx1024m -Xmn512m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m
      - SPRING_APPLICATION_NAME=rocketmq-broker
    command: sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    networks:
      - linkhub-network
    restart: unless-stopped
    logging:
      driver: "json-file"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: linkhub-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - SPRING_APPLICATION_NAME=clickhouse
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./short-link-log-go/init-clickhouse:/docker-entrypoint-initdb.d
    networks:
      - linkhub-network
    restart: unless-stopped

  admin:
    build:
      context: ./short-link-java
      dockerfile: admin/Dockerfile
    container_name: linkhub-admin
    ports:
      - "8002:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_APPLICATION_NAME=short-link-admin
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
      - JVM_PROFILE=g1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - linkhub-network
    restart: unless-stopped

  gateway:
    build:
      context: ./short-link-gateway-go
      dockerfile: Dockerfile
    container_name: linkhub-gateway-go
    ports:
      - "8000:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOGSTASH_HOST=log-collector
      - LOGSTASH_PORT=8081
    volumes:
      - ./short-link-gateway-go/config.yaml:/app/config.yaml
    depends_on:
      redis:
        condition: service_started
      log-collector:
        condition: service_started
    networks:
      - linkhub-network
    restart: unless-stopped

  project:
    build:
      context: ./short-link-java
      dockerfile: project/Dockerfile
    container_name: linkhub-project
    ports:
      - "8001:8001"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_APPLICATION_NAME=short-link-project
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
      - JVM_PROFILE=g1
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
      - TRACE_LOGSTASH_HOST=log-collector
      - TRACE_LOGSTASH_PORT=8081
      # Stored short-link host/path (no scheme); must match how users open short links (e.g. gateway 8001 on host).
      - SHORT_LINK_DOMAIN_DEFAULT=127.0.0.1:8001
      - SHORT_LINK_PUBLIC_SCHEME=http
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - linkhub-network
    restart: unless-stopped

  log-collector:
    build:
      context: ./short-link-log-go
      dockerfile: Dockerfile
    container_name: linkhub-log-collector
    ports:
      - "8081:8081"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    depends_on:
      clickhouse:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - linkhub-network
    restart: unless-stopped
    logging:
      driver: "json-file"

  log-frontend:
    build:
      context: ./short-link-log-go
      dockerfile: frontend/Dockerfile
    container_name: linkhub-log-frontend
    ports:
      - "3001:80"
    depends_on:
      - log-collector
    networks:
      - linkhub-network
    restart: unless-stopped
    logging:
      driver: "json-file"

  frontend:
    build:
      context: ./short-link-java/console-vue
      dockerfile: Dockerfile
      args:
        # Align with Java SHORT_LINK_PUBLIC_SCHEME / optional display override (see openspec change prod-shortlink-and-log-base-urls)
        VITE_SHORT_LINK_PUBLIC_SCHEME: http
        VITE_PUBLIC_SHORTLINK_BASE_URL: ""
        VITE_PUBLIC_LOG_CONSOLE_URL: http://localhost:3001
    container_name: linkhub-frontend
    depends_on:
      gateway:
        condition: service_started
    networks:
      - linkhub-network
    restart: unless-stopped

  nginx-proxy:
    image: nginx:latest
    container_name: linkhub-nginx-proxy
    ports:
      - "9090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/linkhub.conf:/etc/nginx/conf.d/linkhub.conf
      - ./nginx/log.conf:/etc/nginx/conf.d/log.conf
      - ./short-link-log-go/frontend:/usr/share/nginx/html
    depends_on:
      - gateway
      - log-frontend
      - frontend
    networks:
      - linkhub-network
    restart: unless-stopped
    logging:
      driver: "json-file"



networks:
  linkhub-network:
    driver: bridge

volumes:
  mysql-data:
  clickhouse-data:
