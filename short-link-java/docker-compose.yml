services:
  mysql:
    build:
      context: .
      dockerfile: mysql/Dockerfile
    container_name: shortlink-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: link
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: shortlink-redis
    ports:
      - "6379:6379"
    networks:
      - shortlink-network
    command: redis-server --maxmemory 384mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    restart: unless-stopped
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: shortlink-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=768m
      - JVM_XMX=768m
      - JVM_XMN=512m
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 768m
    restart: unless-stopped

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.4
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT=-Xms64m -Xmx128m -Xmn64m -XX:MetaspaceSize=32m -XX:MaxMetaspaceSize=64m
    command: sh mqnamesrv
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    restart: unless-stopped

  rocketmq-broker:
    image: apache/rocketmq:4.9.4
    container_name: rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT=-Duser.home=/opt -Xms512m -Xmx1024m -Xmn512m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m
    command: sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 1536m
        reservations:
          memory: 1g
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: shortlink-admin
    ports:
      - "8002:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_started
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 512m
    restart: unless-stopped

  project:
    build:
      context: .
      dockerfile: project/Dockerfile
    container_name: shortlink-project
    ports:
      - "8001:8001"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      nacos:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 768m
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: console-vue/Dockerfile
    container_name: shortlink-frontend
    ports:
      - "9090:80"
    depends_on:
      admin:
        condition: service_started
    networks:
      - shortlink-network
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    restart: unless-stopped
networks:
  shortlink-network:
    driver: bridge

volumes:
  mysql-data:
