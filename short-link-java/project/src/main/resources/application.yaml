server:
  port: 8001

spring:
  application:
    name: short-link-project
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config-${database.env:dev}.yaml
  data:
    redis:
      host: linkhub-redis
      port: 6379
#      password: 123456
  mvc:
    view:
      prefix: /templates/
      suffix: .html
  cloud:
    nacos:
      discovery:
        # 4GB 生产档默认关停 Nacos，消除启动期重试刷屏与常驻内存成本。
        enabled: ${SPRING_CLOUD_NACOS_DISCOVERY_ENABLED:false}
        server-addr: linkhub-nacos:8848

short-link:
  domain:
    default: ${SHORT_LINK_DOMAIN_DEFAULT:localhost:9090}
    # User-visible URL scheme for API/UI (http dev, https prod). Full URL = scheme + "://" + fullShortUrl (host/path from DB).
    public-scheme: ${SHORT_LINK_PUBLIC_SCHEME:http}
  stats:
    locale:
      amap-key: 824c511f0997586ea016f979fdb23087
  goto-domain:
    white-list:
      enable: true
      names: '拿个offer,知乎,掘金,博客园'
      details:
        - nageoffer.com
        - zhihu.com
        - juejin.cn
        - cnblogs.com

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:linkhub-rmqnamesrv:9876}
  producer:
    group: short-link_project-service_stats-save_pg
    tx-group: short-link_project-service_tx-init_pg
    topic: short-link_project-service_topic
    tx-topic: short-link_project-service_tx-init_topic
    favicon-topic: short-link_project-service_favicon-update_topic
    cache-delete-topic: short-link_project-service_cache-delete_topic
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1
  consumer:
    group: short-link_project-service_stats-save_cg
    tx-init-group: short-link_project-service_tx-init_cg
    favicon-group: short-link_project-service_favicon-update_cg
    cache-delete-group: short-link_project-service_cache-delete_cg
    cache-delete-max-reconsume-times: 5

cache:
  lock:
    shard-count: 256
  consistency:
    audit-enabled: true
    audit-interval-ms: 3600000
    sample-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99