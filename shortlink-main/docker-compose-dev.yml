services:
  # Gateway 多实例
  gateway-1:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: shortlink-gateway-1
    ports:
      - "8000:8000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - shortlink-network
    deploy:
      replicas: 3  # 3个副本
    restart: unless-stopped

  gateway-2:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: shortlink-gateway-2
    ports:
      - "8010:8000"  # 不同端口
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - shortlink-network
    restart: unless-stopped
