name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Backend test
        run: ./mvnw -B test
      - name: Backend package
        run: ./mvnw -B -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console-vue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: console-vue/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  quality-guards:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check content policy
        shell: pwsh
        run: ./scripts/check-content.ps1
      - name: Check API contract
        shell: pwsh
        run: ./scripts/check-api-contract.ps1
      - name: Verify no nacos/gateway/remote-call leftovers
        shell: pwsh
        run: |
          $targets = @("nacos", "@FeignClient", "spring-cloud-starter-alibaba-nacos", "dubbo")
          $scope = @(
            "project/src/main",
            "project/pom.xml",
            "pom.xml",
            "docker-compose.yml",
            "scripts",
            "docs",
            "README.md"
          )
          foreach ($t in $targets) {
            $hits = rg -i "$t" $scope
            if ($LASTEXITCODE -eq 0 -and $hits) {
              throw "Found forbidden keyword: $t"
            }
          }
