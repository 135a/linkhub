<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>链接不存在 - Linkhub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .error-code {
      font-size: 96px;
      font-weight: 800;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 15px;
      color: #8899aa;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .home-btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }
    .home-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(233, 69, 96, 0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="title">链接已失效或不存在</div>
    <div class="subtitle">
      该短链接可能已过期、被删除，或者链接地址有误。<br />
      请检查链接是否正确，或联系链接创建者获取新链接。
    </div>
    <a class="home-btn" href="/">返回首页</a>
  </div>
</body>
</html>
