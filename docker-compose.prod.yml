# =============================================
# LinkHub - Docker Compose Prod 模式配置
#
# 特性：
# - 针对 4GB 服务器精心优化（合计 RSS ≤ ~3.6 GB，留 ≥ 400 MB 给内核/SSH）
# - 固定路由：Nacos 已下线，服务发现改为 docker 内网 DNS
# - 资源预算与 JVM 参数严格绑定（见 openspec resource-budget-4gb-production 规范）
# =============================================

services:
  mysql:
    build:
      context: ./short-link-java
      dockerfile: mysql/Dockerfile
    container_name: linkhub-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: link
    volumes:
      - mysql-data:/var/lib/mysql
      - ./short-link-log-go/init-mysql/01_create_log_users.sql:/docker-entrypoint-initdb.d/4-create_log_users.sql
    # innodb-buffer-pool-size 与容器 limit 的 ~36% 对齐，防止 OOMKilled
    command: ["--innodb-buffer-pool-size=256M", "--max-connections=100", "--performance-schema=OFF"]
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 700m
        reservations:
          memory: 500m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: linkhub-redis
    ports:
      - "6379:6379"
    networks:
      - linkhub-network
    # maxmemory 严格低于容器 limit，为 RDB/AOF fork 留头部空间
    command: ["redis-server", "--maxmemory", "192mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    restart: unless-stopped

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.4
    container_name: linkhub-rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT=-Xms64m -Xmx96m -Xmn48m -XX:MetaspaceSize=32m -XX:MaxMetaspaceSize=64m
    command: sh mqnamesrv
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 96m
    restart: unless-stopped

  rocketmq-broker:
    image: apache/rocketmq:4.9.4
    container_name: linkhub-rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT=-Duser.home=/opt -Xms128m -Xmx256m -Xmn128m -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=96m
    command: sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 640m
        reservations:
          memory: 256m
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: linkhub-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./short-link-log-go/init-clickhouse:/docker-entrypoint-initdb.d
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 500m
        reservations:
          memory: 384m
    restart: unless-stopped

  admin:
    build:
      context: ./short-link-java
      dockerfile: admin/Dockerfile
    container_name: linkhub-admin
    ports:
      - "8002:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_REDIS_HOST=redis
      # Nacos 服务发现已关停；admin 通过 Feign URL override 直连 project。
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - AGGREGATION_REMOTE_URL=http://project:8001
      - JVM_PROFILE=g1
      - JAVA_OPTS_EXTRA=-Xms192m -Xmx288m -XX:MaxMetaspaceSize=128m
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 256m
    restart: unless-stopped

  gateway:
    build:
      context: ./short-link-gateway-go
      dockerfile: Dockerfile
    container_name: linkhub-gateway-go
    ports:
      - "8000:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOGSTASH_HOST=log-collector
      - LOGSTASH_PORT=8081
    volumes:
      - ./short-link-gateway-go/config.yaml:/app/config.yaml
    depends_on:
      redis:
        condition: service_started
      log-collector:
        condition: service_started
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 96m
    restart: unless-stopped

  project:
    build:
      context: ./short-link-java
      dockerfile: project/Dockerfile
    container_name: linkhub-project
    ports:
      - "8001:8001"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_CLOUD_NACOS_DISCOVERY_ENABLED=false
      - JVM_PROFILE=g1
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
      - TRACE_LOGSTASH_HOST=log-collector
      - TRACE_LOGSTASH_PORT=8081
      - JAVA_OPTS_EXTRA=-Xms256m -Xmx384m -XX:MaxMetaspaceSize=128m
      # Production public short-link host (no scheme); adjust to your DNS (e.g. link.nym.asia).
      - SHORT_LINK_DOMAIN_DEFAULT=link.nym.asia
      - SHORT_LINK_PUBLIC_SCHEME=https
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 384m
    restart: unless-stopped

  log-collector:
    build:
      context: ./short-link-log-go
      dockerfile: Dockerfile
    container_name: linkhub-log-collector
    ports:
      - "8081:8081"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    depends_on:
      clickhouse:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 192m
        reservations:
          memory: 96m
    restart: unless-stopped

  log-frontend:
    build:
      context: ./short-link-log-go
      dockerfile: frontend/Dockerfile
    container_name: linkhub-log-frontend
    ports:
      - "3001:80"
    depends_on:
      - log-collector
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    restart: unless-stopped

  frontend:
    build:
      context: ./short-link-java/console-vue
      dockerfile: Dockerfile
      args:
        VITE_SHORT_LINK_PUBLIC_SCHEME: https
        VITE_PUBLIC_SHORTLINK_BASE_URL: https://link.nym.asia
        VITE_PUBLIC_LOG_CONSOLE_URL: https://log.nym.asia
    container_name: linkhub-frontend
    depends_on:
      gateway:
        condition: service_started
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    restart: unless-stopped

  nginx-proxy:
    image: nginx:latest
    container_name: linkhub-nginx-proxy
    ports:
      - "9090:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/linkhub.conf:/etc/nginx/conf.d/linkhub.conf
      - ./nginx/log.conf:/etc/nginx/conf.d/log.conf
    depends_on:
      - gateway
      - log-frontend
      - frontend
    networks:
      - linkhub-network
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    restart: unless-stopped

networks:
  linkhub-network:
    driver: bridge

volumes:
  mysql-data:
  clickhouse-data:
